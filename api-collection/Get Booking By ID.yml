info:
  name: Get Booking By ID
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseURL}}/bookings/:bookingID"
  params:
    - name: bookingID
      value: "{{bookingID}}"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - OK
    request:
      url: "{{baseURL}}/bookings/:bookingID"
      method: GET
      params:
        - name: bookingID
          value: "{{bookingID}}"
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
        - name: date
          value: Thu, 16 Apr 2026 20:32:07 GMT
        - name: content-length
          value: "177"
      body:
        type: json
        data: |-
          {
            "id": "7be4debc-09a5-4e65-a749-103f17873f1b",
            "courtId": "court-001",
            "startTime": "2026-04-17T11:00:00+01:00",
            "endTime": "2026-04-17T11:30:00+01:00",
            "guestName": "Virgil Stracke I"
          }
  - name: 404 - Not Found
    request:
      url: "{{baseURL}}/bookings/:bookingID"
      method: GET
      params:
        - name: bookingID
          value: "{{bookingID}}"
          type: path
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: content-type
          value: application/json
        - name: date
          value: Thu, 16 Apr 2026 20:33:06 GMT
        - name: content-length
          value: "30"
      body:
        type: json
        data: |-
          {
            "error": "booking not found"
          }
