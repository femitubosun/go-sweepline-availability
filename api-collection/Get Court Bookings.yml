info:
  name: Get Court Bookings
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseURL}}/courts/:courtID/bookings"
  params:
    - name: courtID
      value: "{{courtID}}"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

