info:
  name: Cancel Booking
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{baseURL}}/bookings/:bookingID/cancel"
  params:
    - name: bookingID
      value: "{{bookingID}}"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 - Successfully Cancelled Booking
    request:
      url: "{{baseURL}}/bookings/:bookingID/cancel"
      method: PATCH
      params:
        - name: bookingID
          value: "{{bookingID}}"
          type: path
    response:
      status: 204
      statusText: No Content
      headers:
        - name: content-type
          value: application/json
        - name: date
          value: Thu, 16 Apr 2026 20:38:14 GMT
      body:
        type: json
        data: ""
  - name: 404 - Not Found
    request:
      url: "{{baseURL}}/bookings/:bookingID/cancel"
      method: PATCH
      params:
        - name: bookingID
          value: "{{bookingID}}"
          type: path
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: content-type
          value: application/json
        - name: date
          value: Thu, 16 Apr 2026 21:08:17 GMT
        - name: content-length
          value: "30"
      body:
        type: json
        data: |-
          {
            "error": "booking not found"
          }
